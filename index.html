<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Little Reader</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #6C63FF 0%, #48CAE4 100%); font-family: 'Segoe UI', Arial, sans-serif; }
  h1 { color: white; font-size: 1.7rem; margin-bottom: 2rem; text-align: center; text-shadow: 0 2px 8px rgba(0,0,0,0.2); letter-spacing: 0.01em; }
  .profiles { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; padding: 0 1rem; }
  .profile { background: white; border-radius: 20px; padding: 1.6rem 2rem; text-align: center; cursor: pointer; box-shadow: 0 8px 32px rgba(0,0,0,0.15); transition: transform 0.15s, box-shadow 0.15s; text-decoration: none; display: block; min-width: 130px; }
  .profile:hover, .profile:active { transform: scale(1.06); box-shadow: 0 12px 40px rgba(0,0,0,0.22); }
  .avatar { width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 900; color: white; margin: 0 auto 1rem; }
  .mia .avatar { background: linear-gradient(135deg, #FFB6C1, #FF69B4); }
  .oskar .avatar { background: linear-gradient(135deg, #90EE90, #3CB371); }
  .name { font-size: 1.6rem; font-weight: 800; color: #333; }
</style>
</head>
<body>
<h1>Who is reading today?</h1>
<div class="profiles">
  <a href="app.html?name=Mia" class="profile mia">
    <div class="avatar">M</div>
    <div class="name">Mia</div>
  </a>
  <a href="app.html?name=Oskar" class="profile oskar">
    <div class="avatar">O</div>
    <div class="name">Oskar</div>
  </a>
</div>
</body>
</html>
