<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#6c63ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Little Reader" />
  <title>Little Reader</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #7c73ff 0%, #6c63ff 40%, #48439e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .picker-logo { font-size: 3rem; margin-bottom: 0.5rem; text-align: center; }
    h1 {
      color: white;
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 2rem;
      text-align: center;
      text-shadow: 0 3px 12px rgba(0,0,0,0.2);
      letter-spacing: -0.01em;
    }
    .profiles {
      display: flex;
      gap: 1.8rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      padding: 1.8rem 2.25rem;
      border-radius: 20px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 3px solid rgba(255,255,255,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .profile:hover, .profile:active {
      transform: scale(1.05);
      box-shadow: 0 12px 32px rgba(0,0,0,0.3);
    }
    .avatar {
      width: 126px;
      height: 126px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4.5rem;
      border: 4px solid white;
      box-shadow: 0 8px 28px rgba(0,0,0,0.28);
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .name {
      color: white;
      font-size: 1.6rem;
      font-weight: 700;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="picker-logo">&#128218;</div>
  <h1>Who&#8217;s reading today?</h1>
  <div class="profiles">
    <a href="app.html?name=Mia" class="profile">
      <div class="avatar" style="background: linear-gradient(135deg, #ff4d8d, #ff6b9d);">&#127827;</div>
      <div class="name">Mia</div>
    </a>
    <a href="app.html?name=Oskar" class="profile">
      <div class="avatar" style="background: linear-gradient(135deg, #2ab8a0, #1a9e88);">&#128009;</div>
      <div class="name">Oskar</div>
    </a>
  </div>
</body>
</html>
